<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px 0;
        }
        .container {
            max-width: 700px;
        }
        .app-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .app-header h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .app-header p {
            font-size: 1.1rem;
            color: #666;
            font-weight: 300;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .task-item {
            transition: all 0.3s ease;
            border-bottom: 1px solid #f0f0f0;
            padding: 15px 20px;
        }
        .task-item:last-child {
            border-bottom: none;
        }
        .task-item:hover {
            background-color: #f8f9fa;
            transform: translateX(5px);
        }
        .completed {
            text-decoration: line-through;
            color: #28a745 !important;
            opacity: 0.7;
        }
        .task-checkbox {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .task-title {
            flex-grow: 1;
            font-size: 1.1rem;
        }
        .task-actions {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .task-item:hover .task-actions {
            opacity: 1;
        }
        .btn-add {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.4);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        .form-control {
            border-radius: 25px;
            border: 2px solid #e9ecef;
            padding: 10px 20px;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        @media (max-width: 768px) {
            .app-header h1 {
                font-size: 2.5rem;
            }
            .task-item {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1><i class=""></i> My To-Do List</h1>
            <p>Stay organized and get things done!</p>
        </div>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-plus-circle me-2"></i>Add New Task
            </div>
            <div class="card-body">
                <form method="POST" class="d-flex mb-4">
                    {% csrf_token %}
                    <input type="text" name="title" class="form-control me-3" placeholder="Enter your task here..." required>
                    <button type="submit" class="btn btn-add">
                        <i class="fas fa-plus me-1"></i>Add
                    </button>
                </form>
                
                <div id="task-list">
                    {% for task in tasks %}
                        <div class="task-item d-flex align-items-center">
                            <input class="form-check-input task-checkbox" type="checkbox" id="task-{{ task.id }}" {% if task.completed %}checked{% endif %} data-task-id="{{ task.id }}">
                            <label class="form-check-label task-title {% if task.completed %}completed{% endif %}" for="task-{{ task.id }}">
                                {{ task.title }}
                            </label>
                            <div class="task-actions ms-auto">
                                <a href="{% url 'update' task.id %}" class="text-primary me-2" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a href="{% url 'delete' task.id %}" class="text-danger delete-link" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </div>
                        </div>
                    {% empty %}
                        <div class="empty-state">
                            <i class="fas fa-clipboard-list"></i>
                            <p>No tasks yet. Add one above to get started!</p>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script>
        // Toggle completed status visually
        document.querySelectorAll('.task-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const label = this.nextElementSibling;
                if (this.checked) {
                    label.classList.add('completed');
                } else {
                    label.classList.remove('completed');
                }
                // Note: To persist changes, implement AJAX to update the backend
            });
        });

        // Confirm delete action with sweet alert style
        document.querySelectorAll('.delete-link').forEach(link => {
            link.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to delete this task? This action cannot be undone.')) {
                    e.preventDefault();
                }
            });
        });

        // Animate task items on load
        document.addEventListener('DOMContentLoaded', function() {
            const taskItems = document.querySelectorAll('.task-item');
            taskItems.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    item.style.transition = 'all 0.5s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });

        // Add success animation for new tasks (simulate after form submission)
        // This would need backend integration for real functionality
    </script>
</body>
</html>
